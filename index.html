<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <!-- Modern Google Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Header Section -->
        <header class="header glass-panel">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.5 19C19.9853 19 22 16.9853 22 14.5C22 12.1325 20.176 10.2038 17.8647 10.0212C17.4243 6.6433 14.5165 4 11 4C7.13401 4 4 7.13401 4 11C4 11.2359 4.01166 11.4691 4.03433 11.6989C2.26189 12.3533 1 14.0326 1 16C1 18.2091 2.79086 20 5 20H17.5V19Z" fill="white" fill-opacity="0.2"/>
                    <circle cx="12" cy="12" r="4" stroke="none" fill="#facc15"/>
                </svg>
                <h1>WeatherDash</h1>
            </div>
            
            <div class="search-container">
                <input type="text" id="city-search" placeholder="Search for a city (e.g., Tokyo, London)..." autocomplete="off">
                <div class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <div id="search-history" class="search-history hidden glass-panel">
                    <div class="history-header">
                        <span>Recent Searches</span>
                        <button id="clear-history">Clear</button>
                    </div>
                    <ul id="history-list"></ul>
                </div>
            </div>

            <div class="controls">
                <div class="unit-toggle" id="unit-toggle">
                    <button class="unit-btn active" data-unit="metric">°C</button>
                    <button class="unit-btn" data-unit="imperial">°F</button>
                </div>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                    <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Loading State -->
            <div id="loading" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Analyzing atmospheric data...</p>
            </div>

            <!-- Error State -->
            <div id="error-container" class="error-message glass-panel hidden">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <div class="error-text" id="error-text">API Key might be invalid or city not found.</div>
            </div>

            <!-- Dashboard -->
            <div id="dashboard" class="dashboard grid-layout">
                <!-- Current Weather Section -->
                <section class="current-weather glass-panel">
                    <div class="location-header">
                        <h2 id="city-name">London, UK</h2>
                        <p id="current-date">Fetching date...</p>
                    </div>
                    
                    <div class="weather-primary">
                        <div class="weather-icon-container">
                            <img id="current-icon" src="" alt="Weather Icon">
                        </div>
                        <div class="temperature-display">
                            <h1 id="current-temp">--°</h1>
                            <p id="current-description" class="description">--</p>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                            </div>
                            <div class="detail-info">
                                <span>Humidity</span>
                                <strong id="current-humidity">--%</strong>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
                            </div>
                            <div class="detail-info">
                                <span>Wind Speed</span>
                                <strong id="current-wind">-- km/h</strong>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                            </div>
                            <div class="detail-info">
                                <span>Visibility</span>
                                <strong id="current-visibility">-- km</strong>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            </div>
                            <div class="detail-info">
                                <span>Pressure</span>
                                <strong id="current-pressure">-- hPa</strong>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Forecast Section -->
                <section class="forecast-section">
                    <h3 class="section-title">5-Day Forecast</h3>
                    <div class="forecast-container" id="forecast-container">
                        <!-- Forecast cards injected by JS -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
